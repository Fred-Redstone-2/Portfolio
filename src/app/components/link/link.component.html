<a
  [attr.href]="value() ? value() : null"
  [attr.target]="value() ? '_blank' : null"
  rel="noopener noreferrer"
  (click)="handleClick($event)"
  [class]="{ 'cursor-default': !value() }"
>
  @if (replacementText()) {
    <span>{{ replacementText() }}</span>
  } @else {
    <ng-content />
  }
</a>
