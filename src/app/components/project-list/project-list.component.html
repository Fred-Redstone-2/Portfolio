<div
  class="flex-1 bg-linear-to-br from-gray-500 to-gray-600 bg-size-[400%_400%] animate-gradient-slow"
>
  <div class="ml-40 mr-40 mt-10 mb-10 flex flex-col gap-8">
    <div class="card-base card-hover hover:cursor-pointer" routerLink="/cv">
      <h1 class="text-2xl font-bold text-b">À propos de moi | CV</h1>
      <p class="text-gray-600 mt-3 text-base leading-relaxed">
        Apprenez-en davantage sur moi, ma formation, mes expériences et mes intérêts.
      </p>
    </div>
    <div
      class="grid gap-8 grid-cols-[repeat(var(--cols),minmax(0,1fr))]"
      style="--cols: {{ nbColumns() }}"
    >
      @for (project of projectList(); track project.name; let i = $index) {
        <app-project-preview [project]="project" />
      }
    </div>
  </div>
</div>
